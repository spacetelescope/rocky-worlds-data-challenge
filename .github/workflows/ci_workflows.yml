name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci_tests:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Code style checks
            os: ubuntu-latest
            python: "3.12"
            toxenv: codestyle

          - name: PEP 517
            os: ubuntu-latest
            python: "3.12"
            toxenv: pep517

          - name: Security audit
            os: ubuntu-latest
            python: "3.12"
            toxenv: securityaudit

          - name: Python 3.12 with coverage checking
            os: ubuntu-latest
            python: "3.12"
            toxenv: py312-test-cov

          - name: macOS - Python 3.12
            os: macos-latest
            python: "3.12"
            toxenv: py312-test

          - name: Windows - Python 3.12
            os: windows-latest
            python: "3.12"
            toxenv: py312-test

          - name: Python 3.12 with latest dev versions of key dependencies
            os: ubuntu-latest
            python: "3.12"
            toxenv: py312-test-devdeps

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up Python ${{ matrix.python }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python }}

    - name: Install base dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install tox

    - name: Test with tox
      run: |
        python -m tox -e ${{ matrix.toxenv }}

    - name: Confirm coverage report exists
      if: matrix.toxenv == 'py312-test-cov'
      run: |
        ls -la
        test -f coverage.xml

    - name: Upload coverage to Codecov
      if: matrix.toxenv == 'py312-test-cov'
      uses: codecov/codecov-action@v6
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage.xml
        fail_ci_if_error: true
